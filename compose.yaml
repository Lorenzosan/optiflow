services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: optiflow
      POSTGRES_USER: optiflow
      POSTGRES_PASSWORD: optiflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiflow -d optiflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  optimizer:
    build:
      context: .
      dockerfile: services/optimizer_service/Dockerfile
    environment:
      OPTIFLOW_OPTIMIZER_PORT: "50051"
    expose:
      - "50051"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:50051/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api_service/Dockerfile
    environment:
      OPTIFLOW_API_PORT: "8080"
      OPTIFLOW_OPTIMIZER_URL: "http://optimizer:50051/v1/optimize"
      OPTIFLOW_DATABASE_URL: "postgresql://optiflow:optiflow@postgres:5432/optiflow"
    expose:
      - "8080"
    depends_on:
      optimizer:
        condition: service_healthy
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
