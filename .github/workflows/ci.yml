name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          case "$EVENT_NAME" in
            pull_request)
              base="$BASE_SHA"
              ;;
            push)
              if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
                base="$BEFORE_SHA"
              else
                base="$(git rev-list --max-parents=0 HEAD)"
              fi
              ;;
            *)
              base="$(git rev-parse HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
              ;;
          esac

          git diff --check "$base" "$GITHUB_SHA"

  cpp:
    name: C++ build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  backend:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Test
        run: python -m pytest -q backend/tests

  frontend:
    name: Frontend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Check JavaScript syntax
        run: |
          node --check frontend/app.js
          node --check frontend/scenario.mjs
          node --check frontend/trader.mjs
          node --check frontend/dispatch_charts.mjs

      - name: Test
        run: |
          node --test --test-reporter spec \
            frontend/scenario.test.mjs \
            frontend/trader.test.mjs \
            frontend/dispatch_charts.test.mjs \
            frontend/container_assets.test.mjs

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: backend/Dockerfile
          - image: web
            dockerfile: frontend/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "optiflow-${{ matrix.image }}:ci" .
